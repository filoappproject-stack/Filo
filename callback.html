<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Filo — Accesso in corso...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:system-ui,sans-serif;background:#F7F5F0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{background:#fff;border-radius:16px;padding:40px;text-align:center;box-shadow:0 4px 40px rgba(0,0,0,0.08);}
.logo{width:52px;height:52px;background:#1A4FBF;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
h2{font-size:18px;font-weight:600;color:#1A1A18;margin-bottom:8px;}
p{font-size:14px;color:#9E9B94;}
.spinner{width:32px;height:32px;border:3px solid #E8EEFB;border-top:3px solid #1A4FBF;border-radius:50%;animation:spin 0.8s linear infinite;margin:16px auto 0;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <circle cx="13" cy="13" r="10" stroke="white" stroke-width="2"/>
      <path d="M13 8v5l3.5 2" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <h2>Accesso in corso...</h2>
  <p>Stiamo completando il tuo accesso a Filo.</p>
  <div class="spinner"></div>
</div>
<script>
const SUPABASE_URL = 'https://xkdniukhksfiuromnmtv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhrZG5pdWtoa3NmaXVyb21ubXR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE4MTEsImV4cCI6MjA4OTk0NzgxMX0.J5WQQ4I4Tk-NacZiTAbtd-oA3LIziD5ymPg8RVR8SUs';

async function handleCallback() {
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Prova con token nell'hash (implicit flow)
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    if (access_token && refresh_token) {
      const { data } = await supabaseClient.auth.setSession({ access_token, refresh_token });
      if (data && data.session) {
        window.location.href = '/';
        return;
      }
    }
  }

  // Prova con codice PKCE
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  if (code) {
    const { data } = await supabaseClient.auth.exchangeCodeForSession(code);
    if (data && data.session) {
      window.location.href = '/';
      return;
    }
  }

  // Fallback: ascolta evento auth
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      window.location.href = '/';
    }
  });

  // Timeout sicurezza - torna al login
  setTimeout(() => { window.location.href = '/'; }, 5000);
}

handleCallback();
</script>
</body>
</html>
