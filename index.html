<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: sans-serif;
  background:#F7F5F0;
}

/* LOGIN BUTTON */
#login-btn {
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
  background:#fff;
  border:1px solid #ccc;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

/* APP */
.app {
  padding:40px;
}

/* OVERLAY */
.checkin-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.checkin-box {
  background:white;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<button id="login-btn" onclick="login()">Accedi con Google</button>

<!-- APP -->
<div class="app">
  <h1>Filo</h1>
  <p>La tua dashboard</p>
</div>

<!-- CHECKIN -->
<div class="checkin-overlay" id="checkin-overlay">
  <div class="checkin-box">
    <h3>Check-in energia</h3>
    <button onclick="closeCheckin()">Inizia</button>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://xkdniukhksfiuromnmtv.supabase.co",
  "sb_publishable_UdRD3JHIa14slQ_0ltkNTA_0Xkdkfn4"
);

async function login() {
  await supabase.auth.signInWithOAuth({
    provider: 'google'
  });
}

function closeCheckin() {
  document.getElementById('checkin-overlay').style.display = 'none';
}

// CHECK LOGIN
window.addEventListener('load', async () => {
  const { data: { session } } = await supabase.auth.getSession();

  if (session) {
    document.getElementById('login-btn').style.display = 'none';
    document.getElementById('checkin-overlay').style.display = 'flex';
  }
});
</script>

</body>
</html>
