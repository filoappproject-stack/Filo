<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: sans-serif;
  background:#F7F5F0;
  margin:0;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

/* LOGIN BUTTON */
#login-btn {
  background:#fff;
  border:1px solid #ccc;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* APP */
.container {
  padding:40px;
}

/* OVERLAY */
.checkin-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.checkin-box {
  background:white;
  padding:30px;
  border-radius:12px;
  width:320px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <h2>Filo</h2>
  <button id="login-btn" onclick="login()">Accedi con Google</button>
</div>

<div class="container">
  <h1>Buongiorno</h1>
  <p>La tua dashboard</p>
</div>

<div class="checkin-overlay" id="checkin-overlay">
  <div class="checkin-box">
    <h3>Check-in energia</h3>
    <p>Come ti senti oggi?</p>
    <button onclick="closeCheckin()">Inizia</button>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://xkdniukhksfiuromnmtv.supabase.co",
  "sb_publishable_UdRD3JHIa14slQ_0ltkNTA_0Xkdkfn4"
);

async function login() {
  await supabase.auth.signInWithOAuth({
    provider: 'google'
  });
}

function closeCheckin() {
  document.getElementById('checkin-overlay').style.display = 'none';
}

async function checkUser() {
  const { data: { session } } = await supabase.auth.getSession();

  if (session) {
    document.getElementById('login-btn').style.display = 'none';
    document.getElementById('checkin-overlay').style.display = 'flex';
  }
}

checkUser();
</script>

</body>
</html>
